<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced MP3 Tag Editor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 20px;
            background-color: #eef2f3;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: dashed;
            color: #495057;
        }
        input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
            height: 120px;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.25);
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #218838;
        }
        .cover-preview {
            max-width: 150px;
            max-height: 150px;
            display: block;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-id3-writer@4.4.0/dist/browser-id3-writer.min.js"></script>
</head>
<body>

<div class="container">
    <h2>MP3 Tag & Lyrics Editor</h2>

    <div class="form-group">
        <label style="font-weight: bold;">1. MP3-Datei laden:</label>
        <input type="file" id="mp3File" accept=".mp3">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div class="form-group">
        <label for="title">Titel:</label>
        <input type="text" id="title">
    </div>

    <div class="form-group">
        <label for="artist">Künstler:</label>
        <input type="text" id="artist">
    </div>

    <div class="form-group">
        <label for="album">Album:</label>
        <input type="text" id="album">
    </div>

    <div class="form-group">
        <label for="track">Track-Nummer:</label>
        <input type="number" id="track">
    </div>

    <div class="form-group">
        <label for="lyrics">Songtext (Lyrics):</label>
        <textarea id="lyrics" placeholder="Hier den Songtext einfügen..."></textarea>
    </div>

    <div class="form-group">
        <label for="cover">Cover-Bild ändern (JPEG):</label>
        <input type="file" id="cover" accept=".jpg,.jpeg">
        <img id="coverPreview" class="cover-preview" style="display: none;" alt="Cover Vorschau">
    </div>

    <button id="saveBtn">Datei speichern & herunterladen</button>
</div>

<script>
    let mp3ArrayBuffer = null;
    let coverArrayBuffer = null;

    // 1. MP3 geladen: Tags auslesen UND Datei für den Export vorbereiten
    document.getElementById('mp3File').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Zurücksetzen alter Daten
        document.getElementById('coverPreview').style.display = 'none';
        coverArrayBuffer = null;

        // A) Tags mit jsmediatags auslesen
        jsmediatags.read(file, {
            onSuccess: function(tag) {
                const tags = tag.tags;
                document.getElementById('title').value = tags.title || '';
                document.getElementById('artist').value = tags.artist || '';
                document.getElementById('album').value = tags.album || '';
                document.getElementById('track').value = tags.track || '';
                
                // Lyrics auslesen (falls vorhanden)
                document.getElementById('lyrics').value = (tags.lyrics ? tags.lyrics.lyrics : '');

                // Cover auslesen und anzeigen
                if (tags.picture) {
                    const { data, format } = tags.picture;
                    let base64String = "";
                    for (let i = 0; i < data.length; i++) {
                        base64String += String.fromCharCode(data[i]);
                    }
                    const base64 = window.btoa(base64String);
                    const img = document.getElementById('coverPreview');
                    img.src = `data:${format};base64,${base64}`;
                    img.style.display = 'block';
                }
            },
            onError: function(error) {
                console.log('Keine alten Tags gefunden oder Fehler beim Lesen:', error.type);
            }
        });

        // B) Datei als ArrayBuffer für ID3Writer einlesen
        const reader = new FileReader();
        reader.onload = function(event) {
            mp3ArrayBuffer = event.target.result;
        };
        reader.readAsArrayBuffer(file);
    });

    // 2. Neues Cover-Bild einlesen & Vorschau aktualisieren
    document.getElementById('cover').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            coverArrayBuffer = event.target.result;
            
            // Vorschau updaten
            const blob = new Blob([coverArrayBuffer], {type: file.type});
            const img = document.getElementById('coverPreview');
            img.src = URL.createObjectURL(blob);
            img.style.display = 'block';
        };
        reader.readAsArrayBuffer(file);
    });

    // 3. Neue Tags schreiben und Download auslösen
    document.getElementById('saveBtn').addEventListener('click', function() {
        if (!mp3ArrayBuffer) {
            alert('Bitte lade zuerst eine MP3-Datei!');
            return;
        }

        const writer = new ID3Writer(mp3ArrayBuffer);

        const title = document.getElementById('title').value;
        const artist = document.getElementById('artist').value;
        const album = document.getElementById('album').value;
        const track = document.getElementById('track').value;
        const lyrics = document.getElementById('lyrics').value;

        if (title) writer.setFrame('TIT2', title);
        if (artist) writer.setFrame('TPE1', [artist]);
        if (album) writer.setFrame('TALB', album);
        if (track) writer.setFrame('TRCK', track);
        
        if (lyrics) {
            writer.setFrame('USLT', {
                description: '',
                lyrics: lyrics,
                language: 'eng'
            });
        }

        if (coverArrayBuffer) {
            writer.setFrame('APIC', {
                type: 3,
                data: coverArrayBuffer,
                description: 'Cover',
                useMediumUrl: false
            });
        }

        writer.addTag();

        const taggedBlob = writer.getBlob();
        const url = URL.createObjectURL(taggedBlob);
        
        const downloadLink = document.createElement('a');
        downloadLink.href = url;
        downloadLink.download = (title || 'music') + '.mp3';
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    });
</script>

</body>
</html>
